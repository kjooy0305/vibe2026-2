<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>소설 창작 위키</title>

  <!-- ── PWA Meta Tags ── -->
  <meta name="theme-color" content="#0a0e1a" />
  <meta name="color-scheme" content="dark" />
  <meta name="description" content="웹소설 세계관 관리 앱 — 게임 판타지 탑 등반물 창작 위키" />

  <!-- Apple / iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="창작위키" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- Microsoft / Windows -->
  <meta name="msapplication-TileColor" content="#0a0e1a" />
  <meta name="msapplication-navbutton-color" content="#0a0e1a" />

  <!-- Open Graph -->
  <meta property="og:title" content="소설 창작 위키" />
  <meta property="og:description" content="웹소설 세계관 관리 앱" />
  <meta property="og:type" content="website" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json" />

  <!-- Preconnect for Korean fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/mobile.css" />
  <link rel="stylesheet" href="css/novel-view.css" />
</head>
<body>

<!-- ╔═══════════════════════════════════════════╗ -->
<!-- ║              APP SHELL                    ║ -->
<!-- ╚═══════════════════════════════════════════╝ -->
<div class="app-shell" id="appShell">

  <!-- ── TOP HEADER ── -->
  <header class="top-header" id="topHeader" role="banner">
    <div class="top-header__left">
      <!-- Back button (hidden until navigation history exists) -->
      <button class="icon-btn" id="btnHeaderBack" aria-label="이전 페이지" style="display:none;" onclick="AppRouter.handleBack()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
      </button>
      <!-- Hamburger menu -->
      <button class="icon-btn" id="btnOpenDrawer" aria-label="메뉴 열기" aria-expanded="false" aria-controls="appDrawer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Dynamic page title -->
    <h1 class="top-header__title" id="pageTitle">
      소설 <span>창작위키</span>
    </h1>

    <div class="top-header__right">
      <!-- Search -->
      <button class="icon-btn" id="btnOpenSearch" aria-label="검색" title="전체 검색 (Ctrl+K)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
      </button>
      <!-- More options -->
      <button class="icon-btn" id="btnHeaderMore" aria-label="더보기" title="페이지 옵션">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="5" r="1" fill="currentColor"/>
          <circle cx="12" cy="12" r="1" fill="currentColor"/>
          <circle cx="12" cy="19" r="1" fill="currentColor"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── DRAWER OVERLAY ── -->
  <div class="drawer-overlay" id="drawerOverlay" role="presentation" aria-hidden="true"></div>

  <!-- ── LEFT NAVIGATION DRAWER ── -->
  <nav class="drawer" id="appDrawer" role="navigation" aria-label="전체 메뉴">
    <div class="drawer__header">
      <div class="drawer__logo">
        <div class="drawer__logo-title">소설 창작위키</div>
        <div class="drawer__logo-sub">Game Fantasy Tower Novel</div>
      </div>
      <button class="icon-btn drawer__close" id="btnCloseDrawer" aria-label="메뉴 닫기">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <div class="drawer__nav" id="drawerNav" role="list">

      <!-- ① 메인 -->
      <div class="drawer__section">
        <div class="drawer__section-label">메인</div>
        <button class="drawer__item active" role="listitem" data-page="home">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
            <polyline points="9,22 9,12 15,12 15,22"/>
          </svg>
          홈
        </button>
        <button class="drawer__item" role="listitem" data-page="novel-view">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/>
            <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
          </svg>
          소설 쓰기
        </button>
      </div>

      <!-- ② 세계 설정 -->
      <div class="drawer__section">
        <div class="drawer__section-label">세계 설정</div>
        <button class="drawer__item" role="listitem" data-page="world">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
          </svg>
          세계/차원
        </button>
        <button class="drawer__item" role="listitem" data-page="tower">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="5" y="2" width="14" height="20" rx="2"/>
            <line x1="9" y1="7" x2="15" y2="7"/>
            <line x1="9" y1="11" x2="15" y2="11"/>
            <line x1="9" y1="15" x2="15" y2="15"/>
            <line x1="9" y1="19" x2="15" y2="19"/>
          </svg>
          탑 관리
        </button>
        <button class="drawer__item" role="listitem" data-page="world-rules">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
          세계관 규칙
        </button>
        <button class="drawer__item" role="listitem" data-page="gates">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M9 3v18M15 3v18"/>
            <path d="M3 9h18M3 15h18"/>
          </svg>
          게이트
        </button>
      </div>

      <!-- ② 세계 설정 — 국가/기업 추가 -->
      <div class="drawer__section" style="margin-top:-4px;">
        <div class="drawer__section-label">세계 구성</div>
        <button class="drawer__item" role="listitem" data-page="countries">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M2 12h20M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/>
          </svg>
          국가
        </button>
        <button class="drawer__item" role="listitem" data-page="companies">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="20" height="14" rx="2"/>
            <path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/>
          </svg>
          기업
        </button>
      </div>

      <!-- ③ 인물 -->
      <div class="drawer__section">
        <div class="drawer__section-label">인물</div>
        <button class="drawer__item" role="listitem" data-page="characters">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 00-3-3.87"/>
            <path d="M16 3.13a4 4 0 010 7.75"/>
          </svg>
          캐릭터
        </button>
        <button class="drawer__item" role="listitem" data-page="organizations">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="20" height="14" rx="2"/>
            <path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/>
          </svg>
          조직/단체
        </button>
        <button class="drawer__item" role="listitem" data-page="constellations">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
          성좌
        </button>
        <button class="drawer__item" role="listitem" data-page="family-tree">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="4" r="2"/>
            <circle cx="5" cy="18" r="2"/>
            <circle cx="19" cy="18" r="2"/>
            <path d="M12 6v4M12 10l-7 6M12 10l7 6"/>
          </svg>
          가계도
        </button>
      </div>

      <!-- ④ 능력 & 아이템 -->
      <div class="drawer__section">
        <div class="drawer__section-label">능력 &amp; 아이템</div>
        <button class="drawer__item" role="listitem" data-page="skills">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
          </svg>
          스킬
        </button>
        <button class="drawer__item" role="listitem" data-page="achievements">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="6"/>
            <path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/>
          </svg>
          업적
        </button>
        <button class="drawer__item" role="listitem" data-page="items">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2l9 4.5v11L12 22l-9-4.5v-11L12 2z"/>
            <polyline points="12 22 12 11.5"/>
            <polyline points="21 6.5 12 11.5 3 6.5"/>
          </svg>
          아이템
        </button>
        <button class="drawer__item" role="listitem" data-page="jobs">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/>
            <line x1="7" y1="7" x2="7.01" y2="7"/>
          </svg>
          직업
        </button>
        <button class="drawer__item" role="listitem" data-page="monsters">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14.5 10c-.83 0-1.5-.67-1.5-1.5v-5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5v5c0 .83-.67 1.5-1.5 1.5z"/>
            <path d="M20.5 10H19V8.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
            <path d="M9.5 14.5v-5c0-.83-.67-1.5-1.5-1.5S6.5 8.67 6.5 9.5v5"/>
            <path d="M3.5 14.5H5V13c0-.83-.67-1.5-1.5-1.5S2 12.17 2 13s.67 1.5 1.5 1.5z"/>
            <path d="M20 22v-3H4v3"/>
            <path d="M4 19c0-3.31 3.58-6 8-6s8 2.69 8 6"/>
          </svg>
          몬스터
        </button>
      </div>

      <!-- ⑤ 스토리 -->
      <div class="drawer__section">
        <div class="drawer__section-label">스토리</div>
        <button class="drawer__item" role="listitem" data-page="timeline">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
            <circle cx="12" cy="12" r="10"/>
          </svg>
          타임라인
        </button>
        <button class="drawer__item" role="listitem" data-page="event-graph">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="18" cy="5" r="3"/>
            <circle cx="6" cy="12" r="3"/>
            <circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
          </svg>
          사건 그래프
        </button>
      </div>

      <!-- ⑥ 도구 -->
      <div class="drawer__section">
        <div class="drawer__section-label">도구</div>
        <button class="drawer__item" role="listitem" data-page="status-viewer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2"/>
            <line x1="8" y1="21" x2="16" y2="21"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
          상태창 뷰어
        </button>
        <button class="drawer__item" role="listitem" data-page="templates">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
          </svg>
          템플릿 설정
        </button>
        <button class="drawer__item" role="listitem" data-page="settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M12 2v2M12 20v2M20 12h2M2 12h2M17.66 17.66l1.41 1.41M4.93 19.07l1.41-1.41"/>
          </svg>
          설정
        </button>
        <button class="drawer__item" role="listitem" data-page="reminders">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 01-3.46 0"/>
          </svg>
          리마인더
        </button>
        <button class="drawer__item" role="listitem" data-page="keywords">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/>
            <line x1="7" y1="7" x2="7.01" y2="7"/>
            <path d="M12 12l4 4"/>
          </svg>
          키워드 메모장
        </button>
      </div>
    </div>

    <div class="drawer__footer">
      <div id="drawerVersion">소설 창작 위키 v1.0</div>
      <div id="drawerSyncStatus" style="margin-top:4px; color: var(--color-success); font-size:11px;">
        ● 오프라인 저장됨
      </div>
    </div>
  </nav>

  <!-- ── MAIN CONTENT ── -->
  <main class="page-content" id="app" role="main" aria-live="polite">
    <!-- Pages are rendered here by JS router -->
    <div class="loader-overlay" id="initialLoader">
      <div class="spinner"></div>
    </div>
  </main>

  <!-- ── BOTTOM NAVIGATION ── -->
  <nav class="bottom-nav" id="bottomNav" role="navigation" aria-label="하단 탭 메뉴">
    <button class="bottom-nav__item active" data-page="home" aria-label="홈" aria-selected="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9,22 9,12 15,12 15,22"/>
      </svg>
      <span>홈</span>
    </button>

    <button class="bottom-nav__item" data-page="world" aria-label="세계/차원" aria-selected="false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
      </svg>
      <span>세계</span>
    </button>

    <button class="bottom-nav__item" data-page="characters" aria-label="캐릭터" aria-selected="false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 00-3-3.87"/>
        <path d="M16 3.13a4 4 0 010 7.75"/>
      </svg>
      <span>캐릭터</span>
    </button>

    <button class="bottom-nav__item" data-page="skills" aria-label="스킬" aria-selected="false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
      </svg>
      <span>스킬</span>
    </button>

    <button class="bottom-nav__item" data-page="timeline" aria-label="더보기" aria-selected="false" id="btnMoreTab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="5" cy="12" r="1" fill="currentColor"/>
        <circle cx="12" cy="12" r="1" fill="currentColor"/>
        <circle cx="19" cy="12" r="1" fill="currentColor"/>
      </svg>
      <span>더보기</span>
    </button>
  </nav>

</div>
<!-- end .app-shell -->

<!-- ═══════════════════════════════════════════════
     GLOBAL OVERLAYS
════════════════════════════════════════════════ -->

<!-- ── GLOBAL SEARCH OVERLAY ── -->
<div class="search-overlay" id="searchOverlay" role="search" aria-label="전체 검색" aria-hidden="true">
  <div class="search-overlay__bar">
    <button class="icon-btn" id="btnCloseSearch" aria-label="검색 닫기">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
    </button>
    <input
      type="search"
      class="search-input"
      id="searchInput"
      placeholder="캐릭터, 스킬, 아이템, 세계 검색..."
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
      enterkeyhint="search"
    />
    <button class="icon-btn" id="btnClearSearch" aria-label="검색어 지우기" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M15 9l-6 6M9 9l6 6"/>
      </svg>
    </button>
  </div>
  <div class="search-results" id="searchResults" role="listbox" aria-label="검색 결과">
    <!-- Search results rendered by JS -->
    <div class="search-empty" id="searchEmpty">

<!-- Inline bootstrap: SW registration + keyboard shortcuts -->
<script>
(function () {
  'use strict';

  // ── Service Worker registration ──────────────────────────
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('./sw.js', { scope: './' })
        .then(function (reg) {
          console.log('[App] SW registered, scope:', reg.scope);

          // Listen for updates
          reg.addEventListener('updatefound', function () {
            const newWorker = reg.installing;
            if (!newWorker) return;
            newWorker.addEventListener('statechange', function () {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                // New version available — notify app
                window.dispatchEvent(new CustomEvent('sw-update-available', {
                  detail: { registration: reg }
                }));
              }
            });
          });
        })
        .catch(function (err) {
          console.warn('[App] SW registration failed:', err);
        });
    });
  }

  // ── Keyboard shortcuts ───────────────────────────────────
  document.addEventListener('keydown', function (e) {
    // Ctrl+K or Cmd+K → open search
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      document.getElementById('btnOpenSearch')?.click();
    }
    // Escape → close any open overlay
    if (e.key === 'Escape') {
      if (document.getElementById('searchOverlay')?.classList.contains('open')) {
        document.getElementById('btnCloseSearch')?.click();
      } else if (document.getElementById('globalModalOverlay')?.classList.contains('open')) {
        document.getElementById('btnCloseModal')?.click();
      } else if (document.getElementById('appDrawer')?.classList.contains('open')) {
        document.getElementById('btnCloseDrawer')?.click();
      }
    }
  });

  // ── URL param routing on load ────────────────────────────
  window.addEventListener('DOMContentLoaded', function () {
    const params = new URLSearchParams(window.location.search);
    const page = params.get('page');
    const action = params.get('action');
    if (page && window.AppRouter) {
      window.AppRouter.navigate(page);
      if (action === 'new' && window.AppRouter.triggerAdd) {
        setTimeout(function () { window.AppRouter.triggerAdd(); }, 300);
      }
    }
  });

  // ── Prevent double-tap zoom on iOS ───────────────────────
  var lastTap = 0;
  document.addEventListener('touchend', function (e) {
    var now = Date.now();
    var delta = now - lastTap;
    if (delta < 300 && delta > 0) {
      // Only prevent if NOT on input/textarea/select
      var tag = e.target.tagName.toLowerCase();
      if (!['input', 'textarea', 'select', 'button', 'a'].includes(tag)) {
        e.preventDefault();
      }
    }
    lastTap = now;
  }, { passive: false });

  // ── Handle back button (Android) ─────────────────────────
  window.addEventListener('popstate', function () {
    if (window.AppRouter) {
      window.AppRouter.handleBack();
    }
  });

  // ── Visibility change: refresh data ─────────────────────
  document.addEventListener('visibilitychange', function () {
    if (!document.hidden && window.AppStore) {
      window.AppStore.emit('app-resume');
    }
  });

})();
</script>
