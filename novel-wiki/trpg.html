<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎲 TRPG 게임북 툴</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080812;--bg1:#0e0e1c;--bg2:#14142a;--bg3:#1a1a30;
  --brd:#252540;--brd2:#30305a;
  --gold:#c9a84c;--gold2:#f0c060;
  --pur:#7a5ff5;--red:#c0392b;--grn:#27ae60;
  --txt:#ddd8cc;--muted:#7a7590;
}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--txt);font-family:'Georgia','Batang',serif;display:flex;flex-direction:column;}

/* ─── HEADER ─── */
#hdr{
  background:var(--bg1);border-bottom:2px solid var(--gold);
  padding:6px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;
}
#hdr h1{font-size:16px;color:var(--gold);letter-spacing:2px;text-shadow:0 0 8px rgba(201,168,76,.4);margin-right:auto;}
.mbtn{
  padding:4px 12px;border:1px solid var(--brd2);background:var(--bg2);color:var(--muted);
  cursor:pointer;border-radius:4px;font-size:12px;font-family:inherit;transition:all .2s;
}
.mbtn.on{background:var(--gold);color:#000;border-color:var(--gold);font-weight:700;}
.mbtn:hover:not(.on){background:var(--bg3);}
.hbtn{
  padding:4px 10px;border:1px solid var(--brd2);background:var(--bg3);color:var(--txt);
  cursor:pointer;border-radius:4px;font-size:11px;font-family:inherit;transition:background .2s;
}
.hbtn:hover{background:var(--brd);}
.sep{width:1px;height:20px;background:var(--brd2);}

/* ─── LAYOUT ─── */
#layout{display:flex;flex:1;overflow:hidden;}

/* ─── LEFT (Scene List) ─── */
#lpanel{
  width:190px;min-width:170px;background:var(--bg1);border-right:1px solid var(--brd);
  display:flex;flex-direction:column;overflow:hidden;
}
#lpanel-hdr{
  padding:7px 10px;border-bottom:1px solid var(--brd);
  font-size:10px;font-weight:700;color:var(--gold);letter-spacing:1px;
  display:flex;align-items:center;justify-content:space-between;
}
#scene-list{flex:1;overflow-y:auto;padding:3px;}
.sli{
  padding:6px 9px;cursor:pointer;border-radius:4px;font-size:12px;color:var(--muted);
  border:1px solid transparent;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.sli:hover{background:var(--bg3);color:var(--txt);}
.sli.on{background:var(--bg3);color:var(--gold);border-color:var(--brd2);}

/* ─── CENTER ─── */
#cpanel{flex:1;overflow:hidden;display:flex;flex-direction:column;}

/* Editor */
#editor{flex:1;display:none;flex-direction:column;overflow:hidden;padding:10px;gap:7px;}
.elabel{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:1px;margin-bottom:2px;display:block;}
.einput{
  background:var(--bg2);border:1px solid var(--brd2);color:var(--txt);
  border-radius:4px;padding:6px 9px;font-family:inherit;font-size:13px;outline:none;
  width:100%;transition:border-color .2s;
}
.einput:focus{border-color:var(--gold);}
#etext{flex:1;resize:none;min-height:80px;}
.crow{display:flex;gap:4px;margin-bottom:5px;align-items:center;}
.crow input{
  background:var(--bg2);border:1px solid var(--brd2);color:var(--txt);
  border-radius:4px;padding:4px 7px;font-size:11px;font-family:inherit;outline:none;
}
.crow input:focus{border-color:var(--gold);}
.ctext{flex:2;}
.ccond{flex:1;}
.ceff{flex:1;}
.ctgt{width:55px;font-family:monospace;}
.delbtn{
  background:none;border:1px solid #c0392b44;color:var(--red);
  cursor:pointer;border-radius:4px;padding:3px 7px;font-size:12px;flex-shrink:0;
}
.ebtn{
  padding:5px 12px;border-radius:4px;cursor:pointer;font-size:12px;font-family:inherit;
  border:1px solid var(--brd2);background:var(--bg3);color:var(--txt);transition:all .2s;
}
.ebtn:hover{background:var(--brd);}
.ebtn.pri{background:var(--gold);color:#000;border-color:var(--gold);font-weight:700;}
.ebtn.dan{border-color:#c0392b44;color:var(--red);}

/* Play */
#play{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:18px 22px;}
#pscid{font-size:11px;color:var(--muted);margin-bottom:6px;font-family:monospace;}
#ptxt{
  flex:1;overflow-y:auto;font-size:15px;line-height:1.9;color:var(--txt);
  margin-bottom:16px;padding:14px 16px;background:var(--bg2);
  border:1px solid var(--brd);border-radius:6px;white-space:pre-wrap;
}
#choices{overflow-y:auto;max-height:220px;}
.cbtn{
  display:block;width:100%;padding:11px 16px;margin-bottom:7px;
  background:var(--bg2);border:1px solid var(--brd2);color:var(--txt);
  text-align:left;cursor:pointer;border-radius:6px;font-size:13px;font-family:inherit;
  transition:all .2s;
}
.cbtn::before{content:'▸ ';color:var(--gold);font-size:11px;}
.cbtn:hover{background:var(--bg3);border-color:var(--gold);color:var(--gold);padding-left:22px;}
.cbtn.off{opacity:.4;cursor:not-allowed;}
.cbtn.off:hover{background:var(--bg2);border-color:var(--brd2);color:var(--txt);padding-left:16px;}
.ctag{font-size:10px;color:var(--muted);display:block;margin-top:2px;}
#gameover{display:none;text-align:center;padding:28px;font-size:20px;color:var(--gold);}

/* ─── RIGHT ─── */
#rpanel{
  width:230px;min-width:210px;background:var(--bg1);border-left:1px solid var(--brd);
  overflow-y:auto;display:flex;flex-direction:column;
}
.rsec{border-bottom:1px solid var(--brd);}
.rttl{
  padding:6px 11px;font-size:10px;font-weight:700;color:var(--gold);letter-spacing:1px;
  background:var(--bg2);border-bottom:1px solid var(--brd);cursor:pointer;
  user-select:none;display:flex;justify-content:space-between;align-items:center;
}
.rbody{padding:9px 11px;}

/* Stats */
.sr{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;padding-bottom:3px;border-bottom:1px dashed var(--brd);}
.sn{color:var(--muted);}
.sv{color:var(--gold2);font-weight:700;font-family:monospace;}
#ivars{
  width:100%;background:var(--bg2);border:1px solid var(--brd2);color:var(--txt);
  border-radius:4px;padding:5px 7px;font-size:11px;font-family:monospace;outline:none;resize:none;
}
#ivars:focus{border-color:var(--gold);}

/* Dice */
.dgrid{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:7px;}
.ddie{
  padding:5px 9px;background:var(--bg3);border:1px solid var(--brd2);color:var(--txt);
  cursor:pointer;border-radius:5px;font-size:12px;font-weight:700;font-family:monospace;transition:all .15s;
}
.ddie:hover{background:var(--gold);color:#000;border-color:var(--gold);}
#dres{
  font-size:26px;font-weight:900;color:var(--gold2);text-align:center;
  font-family:monospace;text-shadow:0 0 10px rgba(240,192,96,.5);min-height:36px;margin-bottom:5px;
}
#dlog{font-size:10px;color:var(--muted);font-family:monospace;max-height:70px;overflow-y:auto;line-height:1.6;}

/* Memo */
#memo{
  width:100%;background:var(--bg2);border:1px solid var(--brd2);color:var(--txt);
  border-radius:4px;padding:5px 7px;font-size:12px;font-family:inherit;
  resize:none;outline:none;height:75px;
}
#memo:focus{border-color:var(--gold);}

/* History */
#hlog{font-size:10px;color:var(--muted);max-height:110px;overflow-y:auto;line-height:1.6;font-family:monospace;}
.hitem{padding:2px 0;border-bottom:1px solid var(--brd);}
.hsc{color:var(--pur);}

/* Scrollbars */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:2px;}
::-webkit-scrollbar-thumb:hover{background:var(--gold);}

/* Toast */
#toast{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  background:var(--bg3);border:1px solid var(--gold);color:var(--gold);
  padding:7px 18px;border-radius:18px;font-size:12px;z-index:999;
  opacity:0;transition:opacity .3s;pointer-events:none;
}
#toast.show{opacity:1;}

@media(max-width:700px){#lpanel{display:none;}#rpanel{width:170px;min-width:150px;}}
</style>
</head>
<body>

<div id="hdr">
  <h1>🎲 TRPG 게임북 툴</h1>
  <button class="mbtn" id="bEdit">✏️ 편집</button>
  <button class="mbtn on" id="bPlay">▶ 플레이</button>
  <div class="sep"></div>
  <button class="hbtn" id="bImport">📂 불러오기</button>
  <button class="hbtn" id="bExport">💾 내보내기</button>
  <button class="hbtn" id="bSave">📌 저장</button>
  <button class="hbtn" id="bLoad">⏮ 이어하기</button>
  <button class="hbtn" id="bRestart" style="color:#c0392b;">↺ 재시작</button>
</div>

<div id="layout">
  <!-- LEFT: Scene List -->
  <div id="lpanel">
    <div id="lpanel-hdr">
      <span>씬 목록</span>
      <button class="ebtn pri" id="bNew" style="padding:2px 7px;font-size:10px;">+ 새 씬</button>
    </div>
    <div id="scene-list"></div>
  </div>

  <!-- CENTER -->
  <div id="cpanel">

    <!-- EDITOR -->
    <div id="editor">
      <div style="display:flex;gap:7px;align-items:flex-end;flex-shrink:0;">
        <div>
          <label class="elabel">씬 ID</label>
          <input class="einput" id="eid" style="width:70px;" placeholder="1" />
        </div>
        <div style="flex:1;">
          <label class="elabel">씬 제목 (선택)</label>
          <input class="einput" id="etitle" placeholder="씬 제목" />
        </div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;min-height:0;">
        <label class="elabel">본문 텍스트</label>
        <textarea class="einput" id="etext" placeholder="이 장면의 이야기를 작성하세요..."></textarea>
      </div>
      <div style="flex-shrink:0;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;">
          <label class="elabel" style="margin:0;">선택지</label>
          <button class="ebtn" id="bAddCh" style="padding:2px 9px;font-size:10px;">+ 추가</button>
        </div>
        <div style="font-size:10px;color:var(--muted);margin-bottom:4px;">선택지 텍스트 | 조건 예)hp>=5 | 효과 예)hp-=10 | 이동 씬ID</div>
        <div id="ced" style="max-height:150px;overflow-y:auto;"></div>
      </div>
      <div style="display:flex;gap:5px;flex-shrink:0;">
        <button class="ebtn pri" id="bSaveSc">💾 씬 저장</button>
        <button class="ebtn dan" id="bDelSc">🗑 삭제</button>
        <button class="ebtn" id="bTestSc">▶ 이 씬 테스트</button>
      </div>
    </div>

    <!-- PLAY -->
    <div id="play">
      <div id="pscid"></div>
      <div id="ptxt"></div>
      <div id="choices"></div>
      <div id="gameover"></div>
    </div>
  </div>

  <!-- RIGHT -->
  <div id="rpanel">

    <div class="rsec">
      <div class="rttl" onclick="tog('sbody','stog')">⚔ 상태 <span id="stog">▲</span></div>
      <div class="rbody" id="sbody">
        <div id="sdisp"></div>
        <div id="sivars" style="display:none;">
          <div style="font-size:10px;color:var(--muted);margin-bottom:3px;">초기 변수</div>
          <textarea id="ivars" rows="4" placeholder="hp = 100&#10;gold = 30&#10;sword = 0"></textarea>
        </div>
      </div>
    </div>

    <div class="rsec">
      <div class="rttl" onclick="tog('dbody','dtog')">🎲 주사위 <span id="dtog">▲</span></div>
      <div class="rbody" id="dbody">
        <div class="dgrid">
          <button class="ddie" onclick="roll(4)">d4</button>
          <button class="ddie" onclick="roll(6)">d6</button>
          <button class="ddie" onclick="roll(8)">d8</button>
          <button class="ddie" onclick="roll(10)">d10</button>
          <button class="ddie" onclick="roll(12)">d12</button>
          <button class="ddie" onclick="roll(20)">d20</button>
          <button class="ddie" onclick="roll(100)">d100</button>
        </div>
        <div id="dres">-</div>
        <div id="dlog"></div>
      </div>
    </div>

    <div class="rsec">
      <div class="rttl" onclick="tog('mbody','mtog')">📝 메모 <span id="mtog">▲</span></div>
      <div class="rbody" id="mbody">
        <textarea id="memo" placeholder="단서, 메모를 자유롭게..."></textarea>
      </div>
    </div>

    <div class="rsec">
      <div class="rttl" onclick="tog('hbody','htog')">📜 히스토리 <span id="htog">▲</span></div>
      <div class="rbody" id="hbody">
        <button class="ebtn" onclick="clearHist()" style="width:100%;font-size:10px;margin-bottom:5px;">기록 지우기</button>
        <div id="hlog"></div>
      </div>
    </div>

  </div>
</div>

<input type="file" id="fileIn" accept=".txt,.json" style="display:none;" />
<div id="toast"></div>

<script>
'use strict';

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
const G = {
  mode: 'play',
  scenes: {},
  order: [],
  editId: null,
  initVars: 'hp = 100\ngold = 30\nsword = 0\npotion = 0\nkey = 0',
  play: {
    sceneId: '1',
    vars: {},
    hist: [],
    dlog: [],
  },
};

// ═══════════════════════════════════════════
// PARSER
// ═══════════════════════════════════════════

function parseTxt(txt) {
  const scenes = {}, order = [];
  const blocks = txt.split(/(?=^#\w+#\s*$)/m).filter(b => b.trim());
  for (const block of blocks) {
    const lines = block.split('\n');
    const hm = lines[0].trim().match(/^#(\w+)#$/);
    if (!hm) continue;
    const id = hm[1];
    const choices = [], bodyLines = [];
    let initVars = {};
    for (let i = 1; i < lines.length; i++) {
      const t = lines[i].trim();
      if (!t) { bodyLines.push(''); continue; }
      if (t.startsWith('@vars:')) {
        t.slice(6).split(',').forEach(kv => {
          const p = kv.trim().split('=');
          if (p.length >= 2) { const k=p[0].trim(), v=p.slice(1).join('=').trim(); initVars[k]=isNaN(v)?v:+v; }
        });
        continue;
      }
      if (t.startsWith('- ')) { const c=parseChoice(t.slice(2)); if(c) choices.push(c); continue; }
      bodyLines.push(lines[i]);
    }
    scenes[id] = { id, text: bodyLines.join('\n').trim(), choices, initVars };
    order.push(id);
  }
  return { scenes, order };
}

function parseChoice(raw) {
  let rest = raw.trim();
  let cond = null, tgt = null, eff = '';
  const cm = rest.match(/^\[([^\]]+)\]\s*/);
  if (cm) { cond = cm[1].trim(); rest = rest.slice(cm[0].length); }
  const am = rest.match(/\s*->\s*#(\w+)#\s*$/);
  if (am) { tgt = am[1]; rest = rest.slice(0, rest.length - am[0].length); }
  const em = rest.match(/\{([^}]+)\}\s*$/);
  if (em) { eff = em[1].trim(); rest = rest.slice(0, rest.length - em[0].length); }
  const text = rest.trim();
  if (!text) return null;
  return { text, cond, eff, tgt };
}

function toTxt(scenes, order, initVarsText) {
  let out = '';
  const ids = order.length ? order : Object.keys(scenes).sort((a,b)=>(+a||0)-(+b||0)||a.localeCompare(b));
  ids.forEach((id, i) => {
    const s = scenes[id]; if (!s) return;
    out += `#${id}#\n`;
    if (i === 0 && initVarsText && initVarsText.trim()) {
      const vl = initVarsText.trim().split('\n').map(l=>l.trim().replace(/\s*=\s*/,'=')).filter(Boolean).join(', ');
      if (vl) out += `@vars: ${vl}\n`;
    }
    if (s.text) out += s.text + '\n';
    (s.choices||[]).forEach(c => {
      let line = '- ';
      if (c.cond) line += `[${c.cond}] `;
      line += c.text;
      if (c.eff) line += ` {${c.eff}}`;
      if (c.tgt) line += ` -> #${c.tgt}#`;
      out += line + '\n';
    });
    out += '\n';
  });
  return out.trim();
}

// ═══════════════════════════════════════════
// VARIABLE ENGINE
// ═══════════════════════════════════════════

function makeVars() {
  const v = {};
  G.initVars.split('\n').forEach(l => {
    const m = l.trim().match(/^(\w+)\s*=\s*(.+)$/);
    if (m) { const k=m[1], val=m[2].trim(); v[k]=isNaN(val)?val:+val; }
  });
  const first = G.scenes[G.order[0]];
  if (first && first.initVars) Object.assign(v, first.initVars);
  return v;
}

function evalCond(expr, vars) {
  if (!expr) return true;
  const s = expr.trim();
  if (/^!?\w+$/.test(s)) {
    const neg = s.startsWith('!'), vn = neg ? s.slice(1) : s, val = vars[vn];
    const t = val !== undefined && val !== 0 && val !== false && val !== '';
    return neg ? !t : t;
  }
  const m = s.match(/^(\w+)\s*(>=|<=|==|!=|>|<)\s*(.+)$/);
  if (!m) return true;
  const lhs = vars[m[1]] !== undefined ? vars[m[1]] : 0;
  const rhs = isNaN(m[3].trim()) ? m[3].trim() : +m[3];
  switch(m[2]){ case'>=':return lhs>=rhs; case'<=':return lhs<=rhs; case'==':return lhs==rhs; case'!=':return lhs!=rhs; case'>':return lhs>rhs; case'<':return lhs<rhs; }
  return true;
}

function applyEff(effStr, vars) {
  if (!effStr) return vars;
  const v = { ...vars };
  effStr.split(/[,;]/).forEach(p => {
    const m = p.trim().match(/^(\w+)\s*(\+=|-=|\*=|\/=|=)\s*(.+)$/);
    if (!m) return;
    const vn=m[1], op=m[2], rhs=isNaN(m[3].trim())?m[3].trim():+m[3];
    const cur = +v[vn] || 0;
    switch(op){ case'=':v[vn]=rhs;break; case'+=':v[vn]=cur+(+rhs||0);break; case'-=':v[vn]=cur-(+rhs||0);break; case'*=':v[vn]=cur*(+rhs||1);break; case'/=':v[vn]=rhs?cur/+rhs:cur;break; }
  });
  return v;
}

// ═══════════════════════════════════════════
// PLAYER
// ═══════════════════════════════════════════

function renderScene(id) {
  const sc = G.scenes[id];
  G.play.sceneId = id;
  const goEl = document.getElementById('gameover');
  goEl.style.display = 'none';
  document.getElementById('pscid').textContent = `#${id}#${sc?.title ? ' — ' + sc.title : ''}`;
  document.getElementById('ptxt').textContent = sc ? sc.text : '❌ 씬을 찾을 수 없습니다: #' + id + '#';
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  if (!sc) return;
  const chs = sc.choices || [];
  if (chs.length === 0) {
    goEl.style.display = 'block';
    goEl.innerHTML = `<div style="font-size:30px;margin-bottom:10px;">⚜</div><div>— 이야기가 끝났습니다 —</div><br><button class="ebtn" onclick="restartPlay()" style="font-size:13px;padding:7px 20px;">다시 시작</button>`;
    return;
  }
  chs.forEach(ch => {
    const ok = evalCond(ch.cond, G.play.vars);
    const btn = document.createElement('button');
    btn.className = 'cbtn' + (ok ? '' : ' off');
    let html = esc(ch.text);
    if (ch.cond) html += `<span class="ctag">[${esc(ch.cond)}] ${ok ? '✓' : '✗ 조건 미충족'}</span>`;
    btn.innerHTML = html;
    if (ok) {
      btn.addEventListener('click', () => {
        if (ch.eff) G.play.vars = applyEff(ch.eff, G.play.vars);
        G.play.hist.unshift({ from: id, txt: ch.text });
        updateStats(); updateHist();
        if (ch.tgt) { renderScene(ch.tgt); document.getElementById('ptxt').scrollTop = 0; }
        else { document.getElementById('ptxt').textContent = '⚠️ 이동할 씬 ID가 없습니다.'; choicesEl.innerHTML = ''; }
      });
    }
    choicesEl.appendChild(btn);
  });
  updateHist();
}

function startPlay(fromId) {
  G.play.vars = makeVars();
  G.play.hist = [];
  updateStats(); updateHist();
  renderScene(fromId || G.order[0] || '1');
}
function restartPlay() { startPlay(); }

// ═══════════════════════════════════════════
// EDITOR
// ═══════════════════════════════════════════

function buildSceneList() {
  const el = document.getElementById('scene-list');
  el.innerHTML = G.order.map(id => {
    const s = G.scenes[id];
    const lbl = `#${id}# ${s.title || s.text?.slice(0,18) || ''}`.trim();
    return `<div class="sli${G.editId===id?' on':''}" data-id="${eA(id)}">${esc(lbl)}</div>`;
  }).join('');
  el.querySelectorAll('.sli').forEach(d => d.addEventListener('click', () => loadToEditor(d.dataset.id)));
}

function loadToEditor(id) {
  const s = G.scenes[id]; if (!s) return;
  G.editId = id;
  document.getElementById('eid').value = id;
  document.getElementById('etitle').value = s.title || '';
  document.getElementById('etext').value = s.text || '';
  buildChoicesEditor(s.choices || []);
  buildSceneList();
}

function buildChoicesEditor(chs) {
  document.getElementById('ced').innerHTML = chs.map((c,i) => `
    <div class="crow">
      <input class="ctext" placeholder="선택지 텍스트" value="${eA(c.text||'')}" />
      <input class="ccond" placeholder="조건 hp>=5" value="${eA(c.cond||'')}" />
      <input class="ceff" placeholder="효과 hp-=5" value="${eA(c.eff||'')}" />
      <input class="ctgt" placeholder="이동ID" value="${eA(c.tgt||'')}" />
      <button class="delbtn" onclick="this.closest('.crow').remove()">✕</button>
    </div>`).join('');
}

function getChoices() {
  return [...document.querySelectorAll('#ced .crow')].map(r => ({
    text: r.querySelector('.ctext').value.trim(),
    cond: r.querySelector('.ccond').value.trim(),
    eff: r.querySelector('.ceff').value.trim(),
    tgt: r.querySelector('.ctgt').value.trim(),
  })).filter(c => c.text);
}

function saveScene() {
  const id = document.getElementById('eid').value.trim();
  if (!id) { toast('씬 ID를 입력하세요.'); return; }
  const s = {
    id, title: document.getElementById('etitle').value.trim(),
    text: document.getElementById('etext').value.trim(),
    choices: getChoices(),
    initVars: G.scenes[id]?.initVars || {},
  };
  if (G.editId && G.editId !== id) {
    delete G.scenes[G.editId];
    const i = G.order.indexOf(G.editId);
    if (i>=0) G.order[i]=id; else G.order.push(id);
  } else if (!G.scenes[id]) G.order.push(id);
  G.scenes[id] = s; G.editId = id;
  buildSceneList(); toast('씬이 저장되었습니다.');
}

function delScene() {
  if (!G.editId || !confirm(`씬 #${G.editId}#을 삭제하시겠습니까?`)) return;
  delete G.scenes[G.editId];
  G.order = G.order.filter(i => i !== G.editId);
  G.editId = null;
  ['eid','etitle','etext'].forEach(id => document.getElementById(id).value='');
  document.getElementById('ced').innerHTML='';
  buildSceneList(); toast('삭제되었습니다.');
}

function newScene() {
  const nums = G.order.map(id=>+id).filter(n=>!isNaN(n));
  const nextId = nums.length ? String(Math.max(...nums)+1) : '1';
  G.editId = null;
  document.getElementById('eid').value = nextId;
  ['etitle','etext'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('ced').innerHTML='';
  buildSceneList();
}

// ═══════════════════════════════════════════
// STATS + DICE + HISTORY
// ═══════════════════════════════════════════

function updateStats() {
  const el = document.getElementById('sdisp');
  const v = G.play.vars;
  if (!v || !Object.keys(v).length) { el.innerHTML='<div style="font-size:11px;color:var(--muted);">변수 없음</div>'; return; }
  el.innerHTML = Object.entries(v).map(([k,val]) => {
    let col='var(--gold2)';
    if (k==='hp') { const n=+val; col=n>60?'#27ae60':n>20?'#f39c12':'#c0392b'; }
    return `<div class="sr"><span class="sn">${esc(k.toUpperCase())}</span><span class="sv" style="color:${col};">${esc(String(val))}</span></div>`;
  }).join('');
}

function roll(n) {
  const r = Math.floor(Math.random()*n)+1;
  document.getElementById('dres').textContent = r;
  const entry = `d${n}: ${r}`;
  G.play.dlog.unshift(entry);
  if (G.play.dlog.length>20) G.play.dlog.pop();
  document.getElementById('dlog').innerHTML = G.play.dlog.slice(0,8).map(l=>`<div>${esc(l)}</div>`).join('');
  return r;
}

function updateHist() {
  const el = document.getElementById('hlog');
  if (!G.play.hist.length) { el.innerHTML='<div style="color:var(--muted);">기록 없음</div>'; return; }
  el.innerHTML = G.play.hist.slice(0,25).map(h =>
    `<div class="hitem"><span class="hsc">#${esc(h.from)}#</span> → ${esc(h.txt)}</div>`
  ).join('');
}

function clearHist() { G.play.hist=[]; updateHist(); }

// ═══════════════════════════════════════════
// SAVE / LOAD / IMPORT / EXPORT
// ═══════════════════════════════════════════

function saveGame() {
  localStorage.setItem('trpg_v1', JSON.stringify({
    scenes: G.scenes, order: G.order, initVars: G.initVars,
    play: G.play, memo: document.getElementById('memo').value,
  }));
  toast('💾 저장되었습니다.');
}

function loadGame() {
  const raw = localStorage.getItem('trpg_v1');
  if (!raw) { toast('저장된 데이터가 없습니다.'); return; }
  try {
    const d = JSON.parse(raw);
    G.scenes=d.scenes||{}; G.order=d.order||[]; G.initVars=d.initVars||G.initVars;
    G.play=d.play||{sceneId:G.order[0]||'1',vars:{},hist:[],dlog:[]};
    if (d.memo) document.getElementById('memo').value=d.memo;
    document.getElementById('ivars').value=G.initVars;
    buildSceneList(); updateStats(); updateHist();
    if (G.mode==='play') renderScene(G.play.sceneId);
    toast('⏮ 이어하기 완료.');
  } catch(e) { toast('불러오기 실패: '+e.message); }
}

function exportFile() {
  const txt = toTxt(G.scenes, G.order, G.initVars);
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([txt],{type:'text/plain;charset=utf-8'}));
  a.download = 'scenario.txt'; a.click(); URL.revokeObjectURL(a.href);
  toast('📄 내보내기 완료.');
}

function importFile(txt) {
  const { scenes, order } = parseTxt(txt);
  if (!order.length) { toast('파싱 실패. 형식을 확인하세요.'); return; }
  G.scenes=scenes; G.order=order;
  const first = scenes[order[0]];
  if (first?.initVars && Object.keys(first.initVars).length) {
    G.initVars = Object.entries(first.initVars).map(([k,v])=>`${k} = ${v}`).join('\n');
    document.getElementById('ivars').value=G.initVars;
  }
  buildSceneList();
  if (G.mode==='play') startPlay();
  else if (order.length) loadToEditor(order[0]);
  toast(`✅ ${order.length}개 씬 불러오기 완료.`);
}

// ═══════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════

function setMode(m) {
  G.mode = m;
  document.getElementById('bEdit').classList.toggle('on', m==='editor');
  document.getElementById('bPlay').classList.toggle('on', m==='play');
  document.getElementById('editor').style.display = m==='editor' ? 'flex' : 'none';
  document.getElementById('play').style.display = m==='play' ? 'flex' : 'none';
  document.getElementById('lpanel').style.display = m==='editor' ? 'flex' : 'none';
  document.getElementById('sivars').style.display = m==='editor' ? 'block' : 'none';
  document.getElementById('sdisp').style.display = m==='editor' ? 'none' : 'block';
  if (m==='editor') buildSceneList();
  else { updateStats(); renderScene(G.play.sceneId || G.order[0] || '1'); }
}

function tog(bodyId, togId) {
  const b=document.getElementById(bodyId), t=document.getElementById(togId);
  const h=b.style.display==='none'; b.style.display=h?'block':'none'; if(t) t.textContent=h?'▲':'▼';
}

function toast(msg) {
  const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),2500);
}

function esc(s) { if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function eA(s) { return esc(s).replace(/'/g,'&#39;'); }

// ═══════════════════════════════════════════
// SAMPLE SCENARIO
// ═══════════════════════════════════════════

const SAMPLE = `#1#
@vars: hp=100, gold=30, sword=0, potion=0, key=0
안개 낀 숲길 어귀에 서 있습니다. 등 뒤로는 험난한 산길, 앞에는 낡은 목책으로 둘러싸인 작은 마을이 보입니다.

허리춤엔 낡은 단검 하나, 주머니엔 금화 30냥이 전부입니다.
- 마을 문으로 들어간다 -> #2#
- 숲 속을 탐험한다 -> #3#
- 산길 위쪽으로 올라간다 -> #10#

#2#
마을에 들어서자 퀴퀴한 냄새가 납니다. 마을 사람들이 경계하는 눈빛으로 바라봅니다. 광장 중앙엔 우물이, 북쪽엔 대장간, 서쪽엔 여관이 보입니다.
- 대장간에 간다 -> #4#
- 여관에 들어간다 -> #5#
- 우물을 살펴본다 -> #6#
- 마을을 떠난다 -> #1#

#3#
숲 속 깊이 들어가자 바스락거리는 소리가 들립니다. 고블린 두 마리가 나타납니다!

⚠️ 고블린과 싸우면 체력을 잃습니다.
- [hp >= 50] 고블린과 싸운다 {hp -= 25, gold += 15} -> #7#
- [potion >= 1] 포션을 마시고 싸운다 {hp += 20, potion -= 1, hp -= 15, gold += 15} -> #7#
- 도망친다 {hp -= 5} -> #1#

#4#
대장간 노인이 쇠를 두드리고 있습니다. "검 하나에 금화 20냥, 포션은 10냥이오."
- [gold >= 20] 검을 구입한다 {gold -= 20, sword = 1} -> #8#
- [gold >= 10] 포션을 구입한다 {gold -= 10, potion += 1} -> #2#
- 그냥 나간다 -> #2#

#5#
여관 안은 따뜻합니다. 주인장이 반갑게 맞이합니다. "하룻밤에 5냥이오."

벽의 지도에 마을 동쪽 폐허에 던전이 있다고 표시되어 있습니다.
- [gold >= 5] 방을 빌린다 (HP+30) {gold -= 5, hp += 30} -> #2#
- 주인장에게 던전 정보를 묻는다 -> #9#
- 나간다 -> #2#

#6#
우물 안을 들여다보니 녹슨 열쇠가 보입니다.
- 열쇠를 꺼낸다 {key = 1} -> #2#
- 그냥 지나친다 -> #2#

#7#
치열한 싸움 끝에 고블린들을 물리쳤습니다! 금화를 주웠습니다.

💪 용감히 싸운 덕분에 자신감이 생겼습니다.
- [sword == 1] 검을 들고 던전으로 향한다 -> #11#
- 마을로 돌아간다 -> #2#

#8#
노인이 건네준 검은 묵직하면서도 균형이 잘 잡혀 있습니다.

⚔️ [검 획득]
- 던전을 향해 떠난다 -> #11#
- 마을을 더 둘러본다 -> #2#

#9#
주인장이 목소리를 낮춥니다. "동쪽 폐허 지하에 던전이 있소. 이상한 빛이 보인다는 소문이 있지. 열쇠가 있어야 안으로 들어갈 수 있다더군..."
- 던전을 탐험하러 간다 -> #11#
- 더 준비하러 간다 -> #2#

#10#
산길 위에 낡은 수도원이 있습니다. 문은 굳게 잠혀 있습니다.
- [key == 1] 열쇠로 문을 열어본다 -> #12#
- 돌아간다 -> #1#

#11#
동쪽 폐허에 도착했습니다. 거대한 돌문 앞에서 어둠 속 목소리가 울립니다.

"인간이여... 이 던전에 들어오려면 시험을 통과해야 한다."
- [sword == 1] 검을 들고 당당히 들어선다 -> #13#
- [key == 1] 열쇠로 옆문을 열어 들어간다 -> #13#
- 도망친다 -> #2#

#12#
열쇠가 맞습니다! 수도원 문이 열리며 황금빛 빛이 쏟아집니다. 금고 속에 보물이 가득합니다!

🏆 당신은 보물을 발견했습니다!
- 보물을 가지고 마을로 돌아간다 {gold += 100} -> #14#

#13#
던전 안은 어둡고 차갑습니다. 강력한 오우거가 나타납니다!

현재 체력이 클수록 유리합니다. HP가 낮으면 위험합니다.
- [hp >= 70] 정면으로 싸운다 {hp -= 40} -> #15#
- [sword == 1] 검으로 빠르게 공격한다 {hp -= 20} -> #15#
- 도망친다 {hp -= 10} -> #2#

#14#
축하합니다! 당신은 마을로 돌아왔습니다. 마을 사람들이 환호합니다.

🎉 — 행복한 결말 —
- 처음부터 다시 시작한다 -> #1#

#15#
오우거를 물리쳤습니다! 보물 창고에서 엄청난 금화를 발견했습니다.

🏆 당신은 던전을 정복했습니다!
- 보물을 들고 마을로 돌아간다 {gold += 80} -> #14#
`;

// ═══════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════

(function init() {
  const { scenes, order } = parseTxt(SAMPLE);
  G.scenes = scenes; G.order = order;
  document.getElementById('ivars').value = G.initVars;

  document.getElementById('bEdit').onclick = () => setMode('editor');
  document.getElementById('bPlay').onclick = () => setMode('play');
  document.getElementById('bNew').onclick = newScene;
  document.getElementById('bSaveSc').onclick = saveScene;
  document.getElementById('bDelSc').onclick = delScene;
  document.getElementById('bAddCh').onclick = () => {
    const r=document.createElement('div'); r.className='crow';
    r.innerHTML=`<input class="ctext" placeholder="선택지 텍스트"/><input class="ccond" placeholder="조건 hp>=5"/><input class="ceff" placeholder="효과 hp-=5"/><input class="ctgt" placeholder="이동ID"/><button class="delbtn" onclick="this.closest('.crow').remove()">✕</button>`;
    document.getElementById('ced').appendChild(r);
  };
  document.getElementById('bTestSc').onclick = () => {
    const id = document.getElementById('eid').value.trim();
    if (!id) { toast('씬 ID를 먼저 저장하세요.'); return; }
    saveScene(); G.play.vars = makeVars(); setMode('play'); renderScene(id);
  };
  document.getElementById('bSave').onclick = saveGame;
  document.getElementById('bLoad').onclick = loadGame;
  document.getElementById('bExport').onclick = exportFile;
  document.getElementById('bRestart').onclick = restartPlay;
  document.getElementById('bImport').onclick = () => document.getElementById('fileIn').click();
  document.getElementById('fileIn').addEventListener('change', e => {
    const f=e.target.files[0]; if (!f) return;
    const r=new FileReader(); r.onload=ev=>importFile(ev.target.result); r.readAsText(f,'utf-8');
    e.target.value='';
  });
  document.getElementById('ivars').addEventListener('input', e => { G.initVars=e.target.value; });
  const savedMemo = localStorage.getItem('trpg_memo');
  if (savedMemo) document.getElementById('memo').value=savedMemo;
  document.getElementById('memo').addEventListener('input', e => localStorage.setItem('trpg_memo',e.target.value));

  setMode('play');
})();
</script>
